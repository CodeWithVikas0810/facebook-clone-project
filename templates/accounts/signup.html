{% extends "base.html" %}

{% block content %}

<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
    <div class="w-full max-w-md">

       
        <div class="text-center mb-6">
            <h1 class="text-5xl font-bold text-blue-600">
                facebook
            </h1>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-8">

            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-gray-800">
                    Create a new account
                </h2>
                <p class="text-gray-500 mt-2">
                    It's quick and easy.
                </p>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                    <p class="text-red-500 text-sm mt-1">
                        {{ field.errors|striptags }}
                    </p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-md transition">
                    Create New Account
                </button>
            </form>

            <div class="border-t mt-6 pt-5 text-center">
                <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:underline font-medium">
                    Already have an account?
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
