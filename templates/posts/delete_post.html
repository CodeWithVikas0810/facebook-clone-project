{% extends "base.html" %}

{% block content %}

<div class="max-w-lg mx-auto mt-16">

    
    <div class="bg-white shadow-lg rounded-lg p-6 border border-red-100">

      
        <h2 class="text-2xl font-bold text-red-600 mb-2">
            Delete Post
        </h2>

        <p class="text-gray-600 mb-6">
            Are you sure you want to delete this post? This action cannot be undone.
        </p>

      
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <p class="text-gray-800 mb-2">
                {{ post.content }}
            </p>

            <small class="text-gray-500">
                {{ post.created_at|date:"d M Y, h:i A" }}
            </small>
        </div>

    
        <form method="POST" class="flex space-x-3">
            {% csrf_token %}

            <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg font-semibold transition">
                Yes, Delete
            </button>

            <a href="{% url 'posts:feed' %}"
               class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-5 py-2 rounded-lg transition">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
